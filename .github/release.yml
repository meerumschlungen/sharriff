changelog:
  exclude:
    labels:
      - skip-changelog
  categories:
    - title: 🚀 Features
      labels:
        - feat
    - title: 🐛 Bug Fixes
      labels:
        - fix
    - title: 📝 Documentation
      labels:
        - docs
    - title: 🔧 Maintenance
      labels:
        - chore
        - refactor
    - title: 🚦 Tests
      labels:
        - test
    - title: ⚡ Performance
      labels:
        - perf
    - title: 📦 Dependencies
      labels:
        - deps
