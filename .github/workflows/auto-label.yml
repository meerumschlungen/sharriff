name: Auto Label

on:
  pull_request:
    types: [opened, edited, reopened, synchronize]
  workflow_dispatch:

jobs:
  label:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write

    steps:
      - name: Label PR based on title
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        with:
          script: |
            const title = context.payload.pull_request.title;

            // Conventional commit regex: type(optional-scope): description
            const conventionalCommitRegex = /^(feat|fix|docs|chore|test|refactor|perf|deps)(\(.+?\))?:\s*.+/;

            // Check if title matches conventional commits format
            const match = title.match(conventionalCommitRegex);

            if (!match) {
              core.setFailed(
                `❌ PR title does not follow Conventional Commits format!\n\n` +
                `Current title: "${title}"\n\n` +
                `Expected format: type(optional-scope): description\n\n` +
                `Valid types: feat, fix, docs, chore, test, refactor, perf, deps\n\n` +
                `Examples:\n` +
                `  - feat: add new feature\n` +
                `  - fix(api): resolve endpoint error\n` +
                `  - docs: update README\n` +
                `  - chore(deps): update dependencies`
              );
              return;
            }

            // Extract the type and use it directly as the label
            const label = match[1];

            await github.rest.issues.setLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: [label]
            });

            core.info(`✅ Applied label: ${label}`);
